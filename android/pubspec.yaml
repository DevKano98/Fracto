name: fracta
description: Real-time misinformation defense for India
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  record: ^5.1.2
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  intl: ^0.19.0
  path_provider: ^2.1.4
  mime: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
name: fracta
description: Real-time misinformation defense for India
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  record: ^6.0.0
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  intl: ^0.19.0
  path_provider: ^2.1.4
  mime: ^1.0.6
  # Background service — keeps Fracta alive when app is not in foreground
  flutter_background_service: ^5.0.5
  # Foreground notification while service runs
  flutter_local_notifications: ^17.2.2
  # Floating overlay button (draw-over-apps permission)
  flutter_overlay_window: ^0.5.0
  # Receive shared text/URLs from other apps (WhatsApp forwards etc.)
  receive_sharing_intent: ^1.8.0
  # Speech recognition for voice assistant
  speech_to_text: ^7.3.0
  # Text-to-speech for voice assistant
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/